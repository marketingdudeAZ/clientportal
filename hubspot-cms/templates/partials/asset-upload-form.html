<!--
  Phase 4: Asset Upload Form Modal
  Multi-file drag-and-drop upload with category/subcategory selection.
  Client uploads auto-approve to live status.
-->
<div class="upload-modal" id="upload-modal" role="dialog" aria-modal="true" aria-label="Upload assets">
  <div class="upload-modal-content">
    <div class="upload-modal-header">
      <h3>Upload Assets</h3>
      <button class="upload-close" onclick="document.getElementById('upload-modal').classList.remove('active')" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 20 20"><path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <form id="upload-form" class="upload-form" enctype="multipart/form-data">
      <input type="hidden" name="property_uuid" value="{{ property.uuid }}">

      {# Drop Zone #}
      <div class="drop-zone" id="drop-zone">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M32 32l-8-8-8 8M24 24v16" stroke="#C8964E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M40.56 34.56A10 10 0 0034 16h-2.52A16 16 0 108 30.34" stroke="#C8964E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <p>Drag &amp; drop files here, or <label for="file-input" class="drop-zone-browse">browse</label></p>
        <p class="drop-zone-hint">JPG, PNG, WEBP, MP4, MOV, PDF, AI, EPS, PSD, SVG &mdash; Max 100MB</p>
        <input type="file" id="file-input" name="files" multiple accept=".jpg,.jpeg,.png,.webp,.mp4,.mov,.pdf,.ai,.eps,.psd,.svg" class="visually-hidden">
      </div>

      {# Selected Files Preview #}
      <div id="file-list" class="file-list"></div>

      {# Category #}
      <div class="form-group">
        <label for="upload-category">Category</label>
        <select id="upload-category" name="category" required onchange="updateSubcategories()">
          <option value="">Select category&hellip;</option>
          <option value="Photography">Photography</option>
          <option value="Video">Video</option>
          <option value="Brand & Creative">Brand &amp; Creative</option>
          <option value="Marketing Collateral">Marketing Collateral</option>
        </select>
      </div>

      {# Subcategory (dynamic) #}
      <div class="form-group" id="subcategory-group" style="display:none">
        <label for="upload-subcategory">Subcategory</label>
        <select id="upload-subcategory" name="subcategory">
          <option value="">Select subcategory&hellip;</option>
        </select>
      </div>

      {# Description #}
      <div class="form-group">
        <label for="upload-description">Description (optional)</label>
        <textarea id="upload-description" name="description" rows="2" placeholder="Optional caption or description"></textarea>
      </div>

      {# Error Display #}
      <div id="upload-error" class="upload-error" style="display:none"></div>

      {# Progress #}
      <div id="upload-progress" class="upload-progress" style="display:none">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <span id="progress-text">Uploading...</span>
      </div>

      {# Submit #}
      <button type="submit" class="btn btn-primary btn-full" id="upload-submit">Upload</button>
    </form>
  </div>
</div>
