<!--
  Phase 4: Asset Lightbox Modal
  Full-resolution image viewer with download button.
-->
<div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true" aria-label="Asset viewer">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">
    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <div class="lightbox-content">
    <img id="lightbox-img" src="" alt="">
    <div class="lightbox-footer">
      <span id="lightbox-name" class="lightbox-asset-name"></span>
      <a id="lightbox-download" href="" class="btn btn-primary" download>Download</a>
    </div>
  </div>
</div>
