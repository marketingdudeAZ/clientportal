name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r webhook-server/requirements.txt
          pip install pytest

      - name: Run tests
        env:
          # Minimum env to make imports succeed. Real secrets never go in CI.
          HUBSPOT_API_KEY: ci-test
          WEBHOOK_SECRET: ci-test-webhook-secret
          INTERNAL_API_KEY: ci-internal-key
        run: |
          python -m pytest tests/ -v
